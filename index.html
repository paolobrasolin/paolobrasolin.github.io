  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 16pt;
      line-height: 1.5;
    }

    body { margin: 0; }

    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    svg { display: block; }
    svg[hidden] { display: none; }

    /* Layout: window-fill on mobile, floating card on desktop */
    main {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    section { flex-grow: 1; }

    @media (min-width: 768px) {
      body {
        padding: 2rem;
        background-color: #e5e5e5;
      }
      main {
        max-width: 24rem;
        margin: auto;
        height: auto;
        box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
      }
    }

    /* Header */
    header {
      background-color: #000;
      color: #fff;
      padding: 1rem;
    }

    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      line-height: 2.25rem;
    }

    @media (min-width: 640px) {
      header h1 { text-align: center; }
    }

    /* Section */
    section {
      background-color: #fff;
      color: #000;
      padding: 1rem;
    }

    section ul {
      display: grid;
      gap: 0.5rem;
    }

    @media (min-width: 640px) {
      section ul { grid-template-columns: repeat(2, 1fr); }
    }

    /* Links */
    section ul a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.25rem 0.5rem;
      border-radius: 0.5rem;
      background-color: #f5f5f5;
      box-shadow: 0 1px 2px 0 rgba(0,0,0,.05);
      transition: background-color 0.15s, color 0.15s;
    }

    section ul a:hover {
      background-color: #f3e8ff;
      color: #581c87;
    }

    section ul a svg {
      width: 1.25rem;
      height: 1.25rem;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      @media (min-width: 768px) {
        body { background-color: #262626; }
      }
      header { background-color: #171717; }
      section { background-color: #000; color: #fff; }
      section ul a { background-color: #171717; }
      section ul a:hover { background-color: #581c87; color: #f3e8ff; }
    }

    /* Screen reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
