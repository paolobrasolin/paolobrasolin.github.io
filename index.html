  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 125%;
      line-height: 1.6;
      color: #eee;
      background: #111;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    main { width: fit-content; }

    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    h1 {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 3.2em;
    }

    nav li:nth-child(3),
    nav li:nth-child(6),
    nav li:nth-child(9) { margin-top: 1.6em; }

    nav a {
      display: block;
      color: #aaa;
      transition: color 0.15s, text-indent 0.1s steps(2), padding-right 0.1s steps(2);
      text-indent: 0;
      /* Reserve 2ch left for the hover cursor; negative margin keeps text aligned with h1 */
      margin-left: -2ch;
      padding-left: 2ch;
      /* Compensate width so fit-content stays stable when text-indent shifts on hover */
      padding-right: 2ch;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    nav a::before {
      content: '';
      display: inline-block;
      width: 1ch;
      height: 1.2em;
      vertical-align: text-bottom;
      margin-left: -2ch;
      margin-right: 1ch;
      opacity: 0;
      background: currentColor;
      pointer-events: none;
    }

    nav a:hover::before,
    nav a:focus-visible::before {
      animation: blink 1s step-end infinite;
    }

    nav a:hover,
    nav a:focus-visible {
      color: #fff;
      text-indent: 2ch;
      padding-right: 0;
      outline: none;
    }

    @media (prefers-color-scheme: light) {
      html { color: #111; background: #eee; }
      nav a { color: #444; }
      nav a:hover, nav a:focus-visible { color: #000; }
    }
  </style>
</head>
